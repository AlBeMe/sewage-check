<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sewage Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; color: #333; line-height: 1.5; }
  .container { max-width: 500px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  p { margin-bottom: 1rem; color: #666; }
  label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
  input { width: 100%; padding: 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 1rem; }
  button { width: 100%; padding: 14px; font-size: 1.1rem; background: #007bff; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  button:hover { background: #0056b3; }
  .examples { margin-top: 1.5rem; font-size: 0.85rem; color: #888; }
  .examples code { display: block; padding: 6px 10px; background: #eee; border-radius: 4px; margin: 4px 0; word-break: break-all; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Sewage Check</h1>
  <p>Check Thames Water sewage outflows near the Kennet &amp; Avon Canal, River Avon, or River Pang.</p>
  <form action="/check" method="get">
    <label for="q">Postcode or lat,lng</label>
    <input type="text" id="q" name="q" placeholder="e.g. RG17 9AH or 51.411,-1.513" value="{{ last_location }}">
    <label for="radius">Radius (miles)</label>
    <input type="number" id="radius" name="radius" value="{{ last_radius }}" min="1" max="50">
    <button type="submit">Check</button>
  </form>
  <div class="examples">
    <p>Or use a direct link:</p>
    <code>sewage-check.onrender.com/check?q=RG17+9AH</code>
    <code>sewage-check.onrender.com/check?q=51.411,-1.513&amp;radius=10</code>
  </div>
</div>
</body>
</html>
